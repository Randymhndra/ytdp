<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Seamless YouTube Crossfader</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom YouTube Music scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #030303; }
        ::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #999; }

        /* YTM Range Sliders */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        /* Seek slider specific red accent */
        #seekSlider::-webkit-slider-thumb {
            background: #ff0000;
            height: 14px;
            width: 14px;
            margin-top: -5px;
            opacity: 0; /* Hide thumb until hover like YTM */
            transition: opacity 0.2s;
        }
        .seek-container:hover #seekSlider::-webkit-slider-thumb {
            opacity: 1;
        }
        #seekSlider::-webkit-slider-runnable-track {
            background: linear-gradient(to right, #ff0000 var(--progress, 0%), rgba(255, 255, 255, 0.2) var(--progress, 0%));
        }

        /* Player states */
        .active-player { 
            border-color: rgba(255, 255, 255, 0.2); 
            opacity: 1; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
        }
        .inactive-player { 
            border-color: transparent; 
            opacity: 0.4; 
            filter: grayscale(80%); 
        }
        .vol-bar { transition: width 0.1s linear; }
    </style>
</head>
<body class="bg-[#030303] text-white font-sans min-h-screen overflow-x-hidden selection:bg-white/30">

    <!-- Top Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 h-16 bg-[#030303] flex items-center px-4 md:px-6 z-50">
        <div class="flex items-center gap-2 mr-8">
            <i class="fas fa-play-circle text-red-600 text-2xl"></i>
            <span class="text-xl font-bold tracking-tight">Seamless Music</span>
        </div>
        
        <div class="flex-1 max-w-2xl flex items-center relative">
            <div class="absolute left-4 text-gray-400"><i class="fas fa-search"></i></div>
            <input type="text" id="playlistInput" placeholder="Load YouTube Playlist URL..." class="w-full bg-[#212121] border border-[#333] rounded-full pl-12 pr-24 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-white/50 transition-colors text-sm">
            <button onclick="fetchPlaylist()" class="absolute right-0 top-0 bottom-0 px-6 bg-white text-black font-semibold rounded-r-full hover:bg-gray-200 transition-colors text-sm">
                Load
            </button>
        </div>
    </nav>
    <div id="playlistStatus" class="fixed top-16 left-0 w-full text-center py-1 text-xs font-semibold hidden z-40 bg-[#212121]">Loading...</div>

    <!-- Main Content Area -->
    <main class="pt-24 pb-32 px-4 md:px-8 max-w-[1600px] mx-auto flex flex-col lg:flex-row gap-8">
        
        <!-- Left Column: The Players -->
        <div class="flex-1 flex flex-col gap-6">
            <div class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-[-10px]">Crossfade Decks</div>
            <div class="flex flex-col md:flex-row gap-4 relative">
                
                <!-- Deck A -->
                <div id="playerContainer0" class="flex-1 bg-[#121212] p-4 rounded-xl border active-player transition-all duration-500">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-semibold text-gray-300">Deck A</span>
                        <i class="fas fa-volume-up text-white text-sm" id="volIcon0"></i>
                    </div>
                    <div class="w-full h-1 bg-white/10 rounded-full mb-4 overflow-hidden">
                        <div id="volBar0" class="vol-bar h-full bg-white" style="width: 100%;"></div>
                    </div>
                    <div id="player0" class="rounded-lg overflow-hidden pointer-events-none w-full bg-black aspect-video"></div>
                </div>
                
                <!-- Crossfade Indicator -->
                <div id="crossfadeIndicator" class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white text-black px-4 py-2 rounded-full font-bold shadow-2xl z-10 transition-opacity duration-300 text-sm whitespace-nowrap" style="opacity: 0;">
                    <i class="fas fa-random mr-2"></i>FADING
                </div>

                <!-- Deck B -->
                <div id="playerContainer1" class="flex-1 bg-[#121212] p-4 rounded-xl border inactive-player transition-all duration-500">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-semibold text-gray-300">Deck B</span>
                        <i class="fas fa-volume-mute text-white text-sm" id="volIcon1"></i>
                    </div>
                    <div class="w-full h-1 bg-white/10 rounded-full mb-4 overflow-hidden">
                        <div id="volBar1" class="vol-bar h-full bg-white" style="width: 0%;"></div>
                    </div>
                    <div id="player1" class="rounded-lg overflow-hidden pointer-events-none w-full bg-black aspect-video"></div>
                </div>
            </div>
            
            <!-- Crossfade Settings inside Main area -->
            <div class="mt-4 bg-[#121212] rounded-xl p-6 flex flex-col sm:flex-row items-center justify-between border border-white/5">
                <div>
                    <h3 class="font-bold text-white mb-1">DJ Settings</h3>
                    <p class="text-xs text-gray-400">Control the automated transition length between tracks.</p>
                </div>
                <div class="flex items-center gap-4 mt-4 sm:mt-0">
                    <span class="text-sm text-gray-400"><span id="fadeTimeDisplay" class="font-bold text-white w-4 inline-block text-right">10</span>s</span>
                    <input type="range" id="fadeSlider" min="2" max="20" value="10" class="w-32" onchange="updateCrossfadeTime(this.value)">
                </div>
            </div>
        </div>

        <!-- Right Column: Up Next Queue -->
        <div class="lg:w-[400px] xl:w-[450px] flex flex-col">
            <h3 class="text-xl font-bold mb-4 text-white">Up Next</h3>
            <ul id="queueList" class="flex-1 space-y-1 overflow-y-auto pr-2 pb-10" style="max-height: calc(100vh - 220px);">
                <!-- Items populated via JS -->
            </ul>
        </div>
    </main>

    <!-- Bottom Playback Bar (YTM Style) -->
    <footer class="fixed bottom-0 left-0 right-0 bg-[#212121] z-50 flex flex-col">
        <!-- Seek Bar Container -->
        <div class="w-full h-1 bg-transparent absolute top-0 transform -translate-y-1/2 seek-container group px-0">
            <input type="range" id="seekSlider" min="0" max="0" value="0" class="w-full h-full block cursor-pointer" onmousedown="isSeeking=true" ontouchstart="isSeeking=true" oninput="updateTimeDisplay(this.value)" onchange="executeSeek(this.value)">
        </div>

        <div class="flex items-center justify-between px-4 md:px-6 h-[72px]">
            <!-- Left: Time (In YTM, time is often near controls, but we'll put it here for balance) -->
            <div class="w-1/3 flex items-center text-xs font-mono text-[#aaaaaa]">
                <span id="currentTimeDisplay" class="w-10 text-right">0:00</span>
                <span class="mx-1">/</span>
                <span id="totalTimeDisplay" class="w-10 text-left">0:00</span>
            </div>

            <!-- Center: Core Controls -->
            <div class="w-1/3 flex justify-center items-center gap-4 sm:gap-6">
                <button id="prevBtn" onclick="playPrevious()" disabled class="p-4 text-gray-400 hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fas fa-step-backward text-xl"></i>
                </button>
                <button id="playPauseBtn" onclick="togglePlayback()" disabled class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-transform disabled:opacity-50 disabled:cursor-not-allowed shadow-lg">
                    <i class="fas fa-spinner fa-spin text-xl"></i>
                </button>
                <button id="nextBtn" onclick="playNext()" disabled class="p-4 text-gray-400 hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fas fa-step-forward text-xl"></i>
                </button>
            </div>

            <!-- Right: Extra / Volume (Placeholder for symmetry) -->
            <div class="w-1/3 flex justify-end items-center text-gray-400 gap-2 sm:gap-4 pr-2">
                <button id="shuffleBtn" onclick="toggleShuffle()" class="p-3 text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-random text-sm"></i>
                </button>
                <button id="repeatBtn" onclick="toggleRepeat()" class="p-3 text-gray-400 hover:text-white transition-colors relative">
                    <i id="repeatIcon" class="fas fa-redo-alt text-sm"></i>
                    <span id="repeatOneBadge" class="absolute top-[8px] right-[4px] text-[9px] font-bold bg-[#030303] text-white rounded-full w-[14px] h-[14px] flex items-center justify-center hidden border border-[#030303]">1</span>
                </button>
            </div>
        </div>
    </footer>

    <!-- Application Logic -->
    <script>
        // --- CONFIGURATION ---
        // A default list of NoCopyrightSounds (NCS) Video IDs
        let playlist = [
            'jGflUbPQfW8', 
            'K4DyBUG242c', 
            'bM7SZ5SBzyY', 
            'n1dd1yax7DI'  
        ];
        
        let trackTitles = {}; // Store fetched titles dynamically
        let players = [null, null, null]; // [Deck A, Deck B, Hidden Fetcher]
        let activePlayerIndex = 0; // 0 for Deck A, 1 for Deck B
        let currentTrackIndex = 0;
        let isCrossfading = false;
        let crossfadeTime = 10; // Default 10 seconds
        let playbackMonitor = null;
        let fadeInterval = null; // Track crossfade interval globally to allow cancellation
        let readyCount = 0; // Ensure all 3 iframes load before playing
        let isPlaying = false; // Track active play state
        let isFetchingPlaylist = false; // Timeout tracker
        let isSeeking = false; // Track if user is dragging slider
        let isPreloading = [false, false, false]; // Track if player is doing a stealth load

        // Playlist state extensions
        let nextPreloadedIndex = 1; 
        let isShuffle = false;
        let repeatState = 0; // 0=Off, 1=All, 2=One
        let shuffledQueue = [];

        // Update crossfade duration
        function updateCrossfadeTime(val) {
            crossfadeTime = parseInt(val);
            document.getElementById('fadeTimeDisplay').innerText = val;
        }

        // Helper for mm:ss
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            let m = Math.floor(seconds / 60);
            let s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        // Called while dragging
        function updateTimeDisplay(val) {
            document.getElementById('currentTimeDisplay').innerText = formatTime(val);
            // Update CSS variable for the red progress track
            let slider = document.getElementById('seekSlider');
            let percentage = slider.max > 0 ? (val / slider.max) * 100 : 0;
            slider.style.setProperty('--progress', `${percentage}%`);
        }

        // Called on release
        function executeSeek(val) {
            if (players[activePlayerIndex] && typeof players[activePlayerIndex].seekTo === 'function') {
                players[activePlayerIndex].seekTo(val, true);
            }
            isSeeking = false; // Resume auto-updates
        }

        // --- SHUFFLE & REPEAT LOGIC ---
        function toggleShuffle() {
            isShuffle = !isShuffle;
            let btn = document.getElementById('shuffleBtn');
            if (isShuffle) {
                btn.classList.replace('text-gray-400', 'text-white');
                generateShuffledQueue();
            } else {
                btn.classList.replace('text-white', 'text-gray-400');
            }
            updatePreload(); 
        }

        function generateShuffledQueue() {
            shuffledQueue = Array.from({length: playlist.length}, (_, i) => i);
            for (let i = shuffledQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledQueue[i], shuffledQueue[j]] = [shuffledQueue[j], shuffledQueue[i]];
            }
            // Ensure current track isn't suddenly pushed far away
            let currIdx = shuffledQueue.indexOf(currentTrackIndex);
            if (currIdx > -1) {
                shuffledQueue.splice(currIdx, 1);
                shuffledQueue.unshift(currentTrackIndex);
            }
        }

        function toggleRepeat() {
            repeatState = (repeatState + 1) % 3;
            let btn = document.getElementById('repeatBtn');
            let badge = document.getElementById('repeatOneBadge');
            
            if (repeatState === 0) { // Off
                btn.classList.replace('text-white', 'text-gray-400');
                badge.classList.add('hidden');
            } else if (repeatState === 1) { // Repeat All
                btn.classList.replace('text-gray-400', 'text-white');
                badge.classList.add('hidden');
            } else if (repeatState === 2) { // Repeat One
                btn.classList.replace('text-gray-400', 'text-white');
                badge.classList.remove('hidden');
            }
            updatePreload(); 
        }

        function getNextTrackIndex(isAutoAdvance = false) {
            if (playlist.length === 0) return -1;
            
            if (isAutoAdvance && repeatState === 2) {
                return currentTrackIndex; // Repeat One loops identically
            }

            if (isShuffle) {
                let idx = shuffledQueue.indexOf(currentTrackIndex);
                if (idx === -1) idx = 0;
                let nextIdx = idx + 1;
                if (nextIdx >= shuffledQueue.length) {
                    return repeatState > 0 ? shuffledQueue[0] : -1; 
                }
                return shuffledQueue[nextIdx];
            } else {
                let nextIdx = currentTrackIndex + 1;
                if (nextIdx >= playlist.length) {
                    return repeatState > 0 ? 0 : -1;
                }
                return nextIdx;
            }
        }

        function getPrevTrackIndex() {
            if (playlist.length === 0) return -1;

            if (isShuffle) {
                let idx = shuffledQueue.indexOf(currentTrackIndex);
                if (idx === -1) idx = 0;
                let prevIdx = idx - 1;
                if (prevIdx < 0) {
                    return repeatState > 0 ? shuffledQueue[shuffledQueue.length - 1] : 0;
                }
                return shuffledQueue[prevIdx];
            } else {
                let prevIdx = currentTrackIndex - 1;
                if (prevIdx < 0) {
                    return repeatState > 0 ? playlist.length - 1 : 0;
                }
                return prevIdx;
            }
        }

        function updatePreload() {
            if (playlist.length === 0 || !players[0]) return;
            let inactiveIdx = activePlayerIndex === 0 ? 1 : 0;
            let nextIdx = getNextTrackIndex(true);
            nextPreloadedIndex = nextIdx;

            if (nextIdx !== -1 && players[inactiveIdx] && typeof players[inactiveIdx].loadVideoById === 'function') {
                players[inactiveIdx].setVolume(0);
                isPreloading[inactiveIdx] = true;
                players[inactiveIdx].loadVideoById(playlist[nextIdx]);
            } else if (nextIdx === -1 && players[inactiveIdx] && typeof players[inactiveIdx].stopVideo === 'function') {
                players[inactiveIdx].stopVideo();
            }
        }

        // Render the track queue UI (YTM Style)
        function renderQueue() {
            const queueList = document.getElementById('queueList');
            let htmlStr = ''; // clear
            
            playlist.forEach((id, index) => {
                let isCurrent = index === currentTrackIndex;
                let colorClass = isCurrent ? 'bg-white/10' : 'hover:bg-white/5';
                let iconOrNum = isCurrent 
                    ? '<i class="fas fa-volume-up text-white text-xs w-4 text-center"></i>' 
                    : `<span class="text-[#aaaaaa] text-sm w-4 text-center group-hover:hidden">${index + 1}</span><i class="fas fa-play text-white text-xs w-4 text-center hidden group-hover:inline-block"></i>`;
                
                let titleText = isCurrent ? 'text-white' : 'text-[#aaaaaa]';
                
                // Set temporary title while we fetch the real one
                let displayTitle = trackTitles[id] || `Loading title...`;

                // Fetch title silently in the background without needing an API key
                if (!trackTitles[id] && !trackTitles[id + '_fetching']) {
                    trackTitles[id + '_fetching'] = true;
                    fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data && data.title) {
                                trackTitles[id] = data.title;
                                // Update all instances of this track in the queue instantly
                                let elements = document.querySelectorAll(`.title-id-${id}`);
                                elements.forEach(el => el.innerText = data.title);
                            } else {
                                trackTitles[id] = `Track ID: ${id}`;
                                let elements = document.querySelectorAll(`.title-id-${id}`);
                                elements.forEach(el => el.innerText = trackTitles[id]);
                            }
                        })
                        .catch(err => {
                            trackTitles[id] = `Track ID: ${id}`;
                            let elements = document.querySelectorAll(`.title-id-${id}`);
                            elements.forEach(el => el.innerText = trackTitles[id]);
                        });
                }

                htmlStr += `
                    <li class="group flex items-center justify-between p-2 rounded-lg ${colorClass} transition-colors cursor-pointer" onclick="hardSwitchToTrack(${index})">
                        <div class="flex items-center gap-4 flex-1 overflow-hidden">
                            ${iconOrNum}
                            <div class="w-12 h-12 bg-[#212121] rounded flex-shrink-0 overflow-hidden relative">
                                <img src="https://img.youtube.com/vi/${id}/default.jpg" class="w-[133%] h-full object-cover absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2" onerror="this.src='https://via.placeholder.com/48x48?text=YT'">
                            </div>
                            <div class="flex flex-col overflow-hidden whitespace-nowrap">
                                <span class="title-id-${id} text-sm font-medium ${titleText} truncate">${displayTitle}</span>
                                <span class="text-xs text-[#aaaaaa] truncate">YouTube Audio</span>
                            </div>
                        </div>
                    </li>
                `;
            });
            
            queueList.innerHTML = htmlStr;
        }

        // --- YOUTUBE API SETUP ---
        // Load the IFrame Player API code asynchronously.
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // This function is automatically called by the YT API once the script loads
        function onYouTubeIframeAPIReady() {
            const originUrl = window.location.protocol.startsWith('http') ? window.location.origin : 'https://youtube.com';

            // Deck A
            players[0] = new YT.Player('player0', {
                height: '240',
                width: '100%',
                videoId: playlist[0],
                playerVars: { 'controls': 0, 'disablekb': 1, 'fs': 0, 'rel': 0, 'modestbranding': 1, 'origin': originUrl },
                events: { 'onReady': onPlayerReady, 'onError': onPlayerError, 'onStateChange': onPlayerStateChange }
            });
            
            // Deck B
            players[1] = new YT.Player('player1', {
                height: '240',
                width: '100%',
                videoId: playlist[1] || playlist[0], // fallback if only 1 song
                playerVars: { 'controls': 0, 'disablekb': 1, 'fs': 0, 'rel': 0, 'modestbranding': 1, 'origin': originUrl },
                events: { 'onReady': onPlayerReady, 'onError': onPlayerError, 'onStateChange': onPlayerStateChange }
            });

            // Hidden Player for Fetching Playlists
            let hiddenDiv = document.createElement('div');
            hiddenDiv.id = 'hiddenPlayer';
            hiddenDiv.style.position = 'absolute';
            hiddenDiv.style.left = '0';
            hiddenDiv.style.top = '0';
            hiddenDiv.style.zIndex = '-50';
            hiddenDiv.style.opacity = '0.01'; // Not exactly 0 to avoid browser throttling
            hiddenDiv.style.width = '240px';
            hiddenDiv.style.height = '240px';
            hiddenDiv.style.pointerEvents = 'none';
            document.body.appendChild(hiddenDiv);

            players[2] = new YT.Player('hiddenPlayer', {
                height: '240',
                width: '240',
                playerVars: { 'controls': 0, 'mute': 1, 'origin': originUrl },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onHiddenPlayerStateChange,
                    'onError': () => {
                        const status = document.getElementById('playlistStatus');
                        status.classList.remove('hidden');
                        status.innerText = "❌ Failed to load playlist. Ensure it is public.";
                        status.className = "fixed top-16 left-0 w-full text-center py-1 text-xs font-semibold z-40 bg-red-900 text-white";
                        document.getElementById('playPauseBtn').disabled = false;
                        document.getElementById('prevBtn').disabled = false;
                        document.getElementById('nextBtn').disabled = false;
                        document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play text-lg translate-x-[2px]"></i>';
                        setTimeout(() => status.classList.add('hidden'), 5000);
                    }
                }
            });
            
            renderQueue();
        }

        // Handle unplayable tracks (often due to copyright blocking embeds)
        function onPlayerError(event) {
            console.warn("Track unplayable. Skipping...", event.data);
            if (!event.target || typeof event.target.getIframe !== 'function') return;
            
            let playerId = event.target.getIframe().id;
            let errorIdx = playerId === 'player0' ? 0 : (playerId === 'player1' ? 1 : -1);
            
            if (errorIdx === activePlayerIndex) {
                let nextIdx = activePlayerIndex === 0 ? 1 : 0;
                
                // Swap UI visually
                document.getElementById(`playerContainer${nextIdx}`).classList.replace('inactive-player', 'active-player');
                document.getElementById(`playerContainer${errorIdx}`).classList.replace('active-player', 'inactive-player');
                document.getElementById(`volBar${errorIdx}`).style.width = `0%`;
                document.getElementById(`volBar${nextIdx}`).style.width = `100%`;
                
                finishCrossfade(errorIdx, nextIdx);
                
                // Ensure methods exist before calling (fixes TypeError if API isn't fully ready)
                if (isPlaying && players[activePlayerIndex] && typeof players[activePlayerIndex].setVolume === 'function') {
                    isPreloading[activePlayerIndex] = false;
                    players[activePlayerIndex].setVolume(100);
                    players[activePlayerIndex].playVideo();
                }
            }
        }

        // Catch states for preloading & auto-advancing
        function onPlayerStateChange(event) {
            if (!event.target || typeof event.target.getIframe !== 'function') return;
            
            let playerId = event.target.getIframe().id;
            let playerIdx = playerId === 'player0' ? 0 : (playerId === 'player1' ? 1 : -1);
            
            // PRELOAD HANDLER: If it's playing in the background, pause and reset immediately
            if (playerIdx !== -1 && event.data === 1 && isPreloading[playerIdx]) {
                event.target.pauseVideo();
                event.target.seekTo(0);
                isPreloading[playerIdx] = false;
                return;
            }

            // Failsafe if track ends before crossfade triggers
            if (event.data === 0) { // State 0 = ended
                let endedIdx = playerIdx;
                
                if (endedIdx === activePlayerIndex && !isCrossfading) {
                    if (nextPreloadedIndex !== -1) {
                        let nextIdx = activePlayerIndex === 0 ? 1 : 0;
                        
                        document.getElementById(`playerContainer${nextIdx}`).classList.replace('inactive-player', 'active-player');
                        document.getElementById(`playerContainer${endedIdx}`).classList.replace('active-player', 'inactive-player');
                        document.getElementById(`volBar${endedIdx}`).style.width = `0%`;
                        document.getElementById(`volBar${nextIdx}`).style.width = `100%`;
                        
                        finishCrossfade(endedIdx, nextIdx);
                        
                        if (isPlaying && players[activePlayerIndex] && typeof players[activePlayerIndex].setVolume === 'function') {
                            isPreloading[activePlayerIndex] = false;
                            players[activePlayerIndex].setVolume(100);
                            players[activePlayerIndex].playVideo();
                        }
                    } else {
                        // End of playlist without repeat on
                        isPlaying = false;
                        document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play text-xl translate-x-[2px]"></i>';
                    }
                }
            }
        }

        // Fired when an iframe finishes loading
        function onPlayerReady(event) {
            readyCount++;
            if(readyCount === 3) { // 3 iframes initialized
                document.getElementById('playPauseBtn').disabled = false;
                document.getElementById('prevBtn').disabled = false;
                document.getElementById('nextBtn').disabled = false;
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play text-lg translate-x-[2px]"></i>';
                
                // Initialize default volumes safely
                if (players[0] && typeof players[0].setVolume === 'function') players[0].setVolume(100);
                if (players[1] && typeof players[1].setVolume === 'function') players[1].setVolume(0);
            }
        }

        // Regex helper to extract 'list' parameter from YouTube URLs
        function extractPlaylistId(url) {
            const reg = /[&?]list=([a-zA-Z0-9_-]+)/i;
            const match = url.match(reg);
            return match ? match[1] : (url.length > 10 && !url.includes('/') ? url : null); 
        }

        // Handle user submitting a playlist link
        function fetchPlaylist() {
            const input = document.getElementById('playlistInput').value;
            const listId = extractPlaylistId(input);
            const status = document.getElementById('playlistStatus');
            status.classList.remove('hidden');
            
            if(!listId) {
                status.innerText = "❌ Invalid Playlist URL. Please check and try again.";
                status.className = "fixed top-16 left-0 w-full text-center py-1 text-xs font-semibold z-40 bg-red-900 text-white";
                setTimeout(() => status.classList.add('hidden'), 3000);
                return;
            }

            status.innerText = "⏳ Fetching playlist tracks...";
            status.className = "fixed top-16 left-0 w-full text-center py-1 text-xs font-semibold z-40 bg-[#333] text-white";
            
            // Stop current playback and reset state
            isPlaying = false;
            if (fadeInterval) clearInterval(fadeInterval);
            if(playbackMonitor) clearInterval(playbackMonitor);
            isCrossfading = false;
            document.getElementById('crossfadeIndicator').style.opacity = '0';
            
            if (players[0] && typeof players[0].stopVideo === 'function') players[0].stopVideo();
            if (players[1] && typeof players[1].stopVideo === 'function') players[1].stopVideo();
            
            document.getElementById('playPauseBtn').disabled = true;
            document.getElementById('prevBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-spinner fa-spin text-lg"></i>';

            // Reset UI decks visually
            activePlayerIndex = 0;
            document.getElementById('playerContainer0').classList.replace('inactive-player', 'active-player');
            document.getElementById('playerContainer1').classList.replace('active-player', 'inactive-player');
            document.getElementById('volBar0').style.width = '100%';
            document.getElementById('volBar1').style.width = '0%';

            // Ask the hidden player to cue the playlist so we can extract its IDs
            isFetchingPlaylist = true;
            if (players[2] && typeof players[2].loadPlaylist === 'function') {
                players[2].loadPlaylist({list: listId, listType: 'playlist'});
                
                setTimeout(() => { if (isFetchingPlaylist && typeof players[2].playVideo === 'function') players[2].playVideo(); }, 1000);

                let pollInterval = setInterval(() => {
                    if (!isFetchingPlaylist) {
                        clearInterval(pollInterval);
                        return;
                    }
                    let fetched = typeof players[2].getPlaylist === 'function' ? players[2].getPlaylist() : null;
                    if (fetched && fetched.length > 0) {
                        clearInterval(pollInterval);
                        handlePlaylistSuccess(fetched);
                    }
                }, 500);

                setTimeout(() => {
                    if (isFetchingPlaylist) {
                        isFetchingPlaylist = false;
                        status.innerText = "❌ Request timed out. Ensure the playlist is public and contains playable tracks.";
                        status.className = "fixed top-16 left-0 w-full text-center py-1 text-xs font-semibold z-40 bg-red-900 text-white";
                        document.getElementById('playPauseBtn').disabled = false;
                        document.getElementById('prevBtn').disabled = false;
                        document.getElementById('nextBtn').disabled = false;
                        document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play text-lg translate-x-[2px]"></i>';
                        setTimeout(() => status.classList.add('hidden'), 5000);
                    }
                }, 8000);
            }
        }

        // Centralized success handler
        function handlePlaylistSuccess(fetched) {
            if (!isFetchingPlaylist) return;
            isFetchingPlaylist = false;
            
            if (typeof players[2].stopVideo === 'function') players[2].stopVideo();
            
            playlist = fetched;
            currentTrackIndex = 0;
            if (isShuffle) generateShuffledQueue();
            
            let nextIdx = getNextTrackIndex(true);
            nextPreloadedIndex = nextIdx;
            
            renderQueue();
            
            const status = document.getElementById('playlistStatus');
            status.innerText = `✅ Successfully loaded ${playlist.length} tracks!`;
            status.className = "fixed top-16 left-0 w-full text-center py-1 text-xs font-semibold z-40 bg-green-700 text-white";
            setTimeout(() => status.classList.add('hidden'), 3000);
            
            // Cue the new tracks into Deck A and Deck B initially
            if (players[0] && typeof players[0].cueVideoById === 'function') {
                isPreloading[0] = false;
                players[0].cueVideoById(playlist[0]);
            }
            if (players[1] && typeof players[1].cueVideoById === 'function') {
                isPreloading[1] = false;
                players[1].cueVideoById(nextIdx !== -1 ? playlist[nextIdx] : playlist[0]);
            }
            
            // Re-enable play/pause/skip buttons
            document.getElementById('playPauseBtn').disabled = false;
            document.getElementById('prevBtn').disabled = false;
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play text-lg translate-x-[2px]"></i>';
        }

        // Fired when hidden player changes state
        function onHiddenPlayerStateChange(event) {
            if (!isFetchingPlaylist) return; 

            if (players[2] && typeof players[2].getPlaylist === 'function') {
                let fetched = players[2].getPlaylist(); 
                if (fetched && fetched.length > 0) {
                    handlePlaylistSuccess(fetched);
                }
            }
        }

        // --- MANUAL TRACK SWITCHING ---
        function playNext() {
            if (playlist.length === 0) return;
            let nextIdx = getNextTrackIndex(false);
            if (nextIdx !== -1) hardSwitchToTrack(nextIdx);
        }

        function playPrevious() {
            if (playlist.length === 0) return;
            let prevIdx = getPrevTrackIndex();
            if (prevIdx !== -1) hardSwitchToTrack(prevIdx);
        }

        function hardSwitchToTrack(targetIndex) {
            if (!players[0] || !players[1]) return;
            
            let oldIdx = activePlayerIndex;
            let newIdx = activePlayerIndex === 0 ? 1 : 0;
            
            // Stop current operations
            if (fadeInterval) clearInterval(fadeInterval);
            if (typeof players[oldIdx].stopVideo === 'function') {
                players[oldIdx].stopVideo();
            }
            
            // Update app states
            activePlayerIndex = newIdx;
            currentTrackIndex = targetIndex;
            isCrossfading = false;
            document.getElementById('crossfadeIndicator').style.opacity = '0';
            
            // Update UI classes and Icons
            document.getElementById(`playerContainer${newIdx}`).classList.replace('inactive-player', 'active-player');
            document.getElementById(`playerContainer${oldIdx}`).classList.replace('active-player', 'inactive-player');
            document.getElementById(`volBar${oldIdx}`).style.width = `0%`;
            document.getElementById(`volBar${newIdx}`).style.width = `100%`;
            document.getElementById(`volIcon${newIdx}`).className = "fas fa-volume-up text-white text-sm";
            document.getElementById(`volIcon${oldIdx}`).className = "fas fa-volume-mute text-white text-sm";
            
            renderQueue();
            
            // Load and play target track
            if (typeof players[newIdx].loadVideoById === 'function') {
                players[newIdx].setVolume(100);
                isPreloading[newIdx] = false;
                players[newIdx].loadVideoById(playlist[targetIndex]);
                
                // Ensure UI reflects playing state
                isPlaying = true;
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause text-xl"></i>';
                
                // Re-start monitoring
                if(playbackMonitor) clearInterval(playbackMonitor);
                playbackMonitor = setInterval(monitorPlayback, 250);
            }
            
            // Preload next sequential track in the old deck
            updatePreload();
        }

        // Play/Pause toggle logic
        function togglePlayback() {
            if (!players[0] || typeof players[0].getPlayerState !== 'function') return;

            let currentPlayer = players[activePlayerIndex];
            if (!currentPlayer) return;

            let btn = document.getElementById('playPauseBtn');

            if (isPlaying) {
                // Pause action
                if (isCrossfading) {
                    if (players[0] && typeof players[0].pauseVideo === 'function') players[0].pauseVideo();
                    if (players[1] && typeof players[1].pauseVideo === 'function') players[1].pauseVideo();
                } else {
                    currentPlayer.pauseVideo();
                }
                isPlaying = false;
                btn.innerHTML = '<i class="fas fa-play text-xl translate-x-[2px]"></i>';
            } else {
                // Play action
                isPlaying = true;
                btn.innerHTML = '<i class="fas fa-pause text-xl"></i>';
                
                if (isCrossfading) {
                    if (players[0] && typeof players[0].playVideo === 'function') players[0].playVideo();
                    if (players[1] && typeof players[1].playVideo === 'function') players[1].playVideo();
                } else {
                    if (typeof currentPlayer.setVolume === 'function' && currentPlayer.getVolume() !== 100) {
                        currentPlayer.setVolume(100);
                    }
                    isPreloading[activePlayerIndex] = false;
                    currentPlayer.playVideo();

                    // Preload the inactive deck immediately now that we have user interaction
                    let inactiveIdx = activePlayerIndex === 0 ? 1 : 0;
                    if (players[inactiveIdx] && typeof players[inactiveIdx].getPlayerState === 'function') {
                        let state = players[inactiveIdx].getPlayerState();
                        // 5 = CUED, -1 = UNSTARTED
                        if (state === 5 || state === -1) {
                            players[inactiveIdx].setVolume(0);
                            isPreloading[inactiveIdx] = true;
                            players[inactiveIdx].playVideo(); // This will trigger PLAYING -> pause at 0
                        }
                    }
                }
                
                // Ensure monitoring continues
                if(playbackMonitor) clearInterval(playbackMonitor);
                playbackMonitor = setInterval(monitorPlayback, 250); 
            }
        }

        // Constantly checks time to see if we need to start fading
        function monitorPlayback() {
            if (isCrossfading || !isPlaying) return;

            let currentPlayer = players[activePlayerIndex];
            if (!currentPlayer || typeof currentPlayer.getPlayerState !== 'function' || currentPlayer.getPlayerState() !== 1) return; // 1 = playing

            let duration = currentPlayer.getDuration();
            let currentTime = currentPlayer.getCurrentTime();

            // UI Updates for Progress Bar
            if (!isSeeking && duration > 0) {
                let slider = document.getElementById('seekSlider');
                if (slider.max != Math.floor(duration)) {
                    slider.max = Math.floor(duration);
                    document.getElementById('totalTimeDisplay').innerText = formatTime(duration);
                }
                slider.value = currentTime;
                
                // Update text and CSS variable for red bar fill
                document.getElementById('currentTimeDisplay').innerText = formatTime(currentTime);
                let percentage = (currentTime / duration) * 100;
                slider.style.setProperty('--progress', `${percentage}%`);
            }

            // Trigger crossfade when remaining time <= crossfadeTime
            if (duration > 0 && (duration - currentTime) <= crossfadeTime) {
                if (nextPreloadedIndex !== -1 && !isCrossfading) {
                    beginCrossfade();
                }
            }
        }

        // Perform the volume manipulation
        function beginCrossfade() {
            isCrossfading = true;
            document.getElementById('crossfadeIndicator').style.opacity = '1';
            
            let fadingOutPlayerIndex = activePlayerIndex;
            let fadingInPlayerIndex = activePlayerIndex === 0 ? 1 : 0;
            
            let playerOut = players[fadingOutPlayerIndex];
            let playerIn = players[fadingInPlayerIndex];

            // Prep the incoming player
            if (playerIn && typeof playerIn.setVolume === 'function') {
                playerIn.setVolume(0);
                isPreloading[fadingInPlayerIndex] = false; // Disable preload flag just in case
                playerIn.playVideo(); // Resume from the preloaded 0:00 mark
            }

            // Toggle CSS classes for the glowing active border
            document.getElementById(`playerContainer${fadingInPlayerIndex}`).classList.replace('inactive-player', 'active-player');
            document.getElementById(`playerContainer${fadingOutPlayerIndex}`).classList.replace('active-player', 'inactive-player');
            
            // Swap icons visually
            document.getElementById(`volIcon${fadingInPlayerIndex}`).className = "fas fa-volume-up text-white text-sm";
            document.getElementById(`volIcon${fadingOutPlayerIndex}`).className = "fas fa-volume-down text-white text-sm";

            let fadeStepTime = 100; // Time in ms per volume tick
            let totalSteps = (crossfadeTime * 1000) / fadeStepTime;
            let currentStep = 0;

            if (fadeInterval) clearInterval(fadeInterval);
            fadeInterval = setInterval(() => {
                if (!isPlaying) return; // Pause fading if playback is paused

                currentStep++;
                
                // Calculate volume (0 to 100)
                let volOut = Math.max(0, 100 - (currentStep / totalSteps) * 100);
                let volIn = Math.min(100, (currentStep / totalSteps) * 100);

                // Apply to YouTube iFrames
                if (playerOut && typeof playerOut.setVolume === 'function') playerOut.setVolume(volOut);
                if (playerIn && typeof playerIn.setVolume === 'function') playerIn.setVolume(volIn);

                // Apply visually to the UI bars
                document.getElementById(`volBar${fadingOutPlayerIndex}`).style.width = `${volOut}%`;
                document.getElementById(`volBar${fadingInPlayerIndex}`).style.width = `${volIn}%`;

                // Finish fading
                if (currentStep >= totalSteps) {
                    clearInterval(fadeInterval);
                    finishCrossfade(fadingOutPlayerIndex, fadingInPlayerIndex);
                }
            }, fadeStepTime);
        }

        // Clean up after fade completes and preload the NEXT track
        function finishCrossfade(oldPlayerIdx, newPlayerIdx) {
            if (players[oldPlayerIdx] && typeof players[oldPlayerIdx].stopVideo === 'function') {
                players[oldPlayerIdx].stopVideo();
            }
            
            activePlayerIndex = newPlayerIdx;
            isCrossfading = false;
            document.getElementById('crossfadeIndicator').style.opacity = '0';
            
            // Set old player icon to mute
            document.getElementById(`volIcon${oldPlayerIdx}`).className = "fas fa-volume-mute text-white text-sm";
            
            // Advance Queue
            currentTrackIndex = nextPreloadedIndex;
            renderQueue();

            // Look ahead to forcefully PRELOAD the old player with track N+1
            updatePreload();
        }
    </script>
</body>
